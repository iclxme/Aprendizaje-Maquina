<!doctype html>
<html lang="es">

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chatbot Deportes — Bonito UI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="chatbot-layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <img src="chatbot.png" alt="Logo Chatbot" class="sidebar-logo" />
          <span class="sidebar-title">SportBot</span>
        </div>
        <button class="newchat">+ Nuevo chat</button>
        <nav class="nav">
          <ul class="nav-list">
            <li><span>Buscar</span></li>
            <li><span>Conversaciones</span></li>
            <li><span>Documentos</span></li>
          </ul>
        </nav>
        <div class="recents">
          <div class="recents-title">Recientes</div>
          <ul class="recents-list">
            <li>Consulta sobre reglas</li>
            <li>Explicación de deporte</li>
            <li>Entrenamiento físico</li>
          </ul>
        </div>
      </aside>
      <main class="main">
        <div class="center">
          <div class="title">

          </div>
          <form id="composer" class="composer" autocomplete="off">
            <input id="input" class="input" type="text" placeholder="¿En qué puedo ayudarte hoy?" required />

          </form>
          <ul id="messages" class="messages"></ul>
        </div>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chatbot Deportes — Virgito UI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <div class="logo">V</div>
          <div class="title">Chatbot Deportes</div>
        </div>
        <nav class="nav">
          <button id="new-chat" class="btn ghost">+ Nueva conversación</button>
        </nav>
        <footer class="sidebar-footer">Virgito • interfaz ligera</footer>
      </aside>

      <main class="main">
        <header class="main-header">
          <div class="main-title">Conversación</div>
          <div class="main-actions">
            <button id="toggle-sources" class="icon-btn" title="Mostrar/Ocultar fuentes">Fuentes</button>
          </div>
        </header>

        <section class="chat-area" id="chat-area">
          <ul id="messages" class="messages" aria-live="polite"></ul>
        </section>

        <form id="composer" class="composer" autocomplete="off">
          <div class="composer-left">
            <textarea id="input" rows="1" placeholder="Haz tu pregunta..." required></textarea>
          </div>
          <div class="composer-right">
            <button id="send" class="btn primary" type="submit">Enviar</button>
          </div>
        </form>
      </main>

      <aside class="right-panel hidden" id="sources-panel">
        <div class="sources-header">Fuentes</div>
        <div id="sources-list" class="sources-list"></div>
      </aside>
    </div>

    <template id="message-template">
      <li class="message">
        <div class="avatar" aria-hidden="true"></div>
        <div class="bubble">
          <div class="meta"><span class="who"></span><span class="time"></span></div>
          <div class="content"></div>
          <div class="msg-actions">
            <button class="copy">Copiar</button>
          </div>
        </div>
      </li>
    </template>

    <script src="app.js"></script>
  </body>
</html>
